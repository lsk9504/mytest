{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="mb-4">
                <h1 class="fw-bold text-dark mb-3">{{ post.title }}</h1>
                <div class="d-flex align-items-center justify-content-between bg-light p-3 rounded-3">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 40px; height: 40px;">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark">{{ post.author.username }}</div>
                            <div class="text-muted small">{{ post.created_at|date:"Y-m-d H:i" }}</div>
                        </div>
                    </div>
                    </div>
            </div>

            <hr class="my-4 opacity-25">

            <div class="post-content mb-5 px-2" style="min-height: 300px; font-size: 1.1rem; line-height: 1.8;">
                {{ post.content|linebreaks }}
            </div>

            <hr class="my-4 opacity-25">

            <div class="d-flex justify-content-between align-items-center mt-5">
                <a href="{% url 'post_list' %}" class="btn btn-outline-dark px-4 shadow-sm">
                    <i class="bi bi-list"></i> 목록으로
                </a>

                {% if user == post.author %}
                <div class="d-flex gap-2">
                    <a href="{% url 'post_update' post.pk %}" class="btn btn-warning px-4 shadow-sm">
                        <i class="bi bi-pencil-fill"></i> 수정
                    </a>
                    <form action="{% url 'post_delete' post.pk %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4 shadow-sm" onclick="return confirm('정말 삭제하시겠습니까?')">
                            <i class="bi bi-trash-fill"></i> 삭제
                        </button>
                    </form>
                </div>
                {% endif %}
            </div>

        </div>
    </div>
</div>

<style>
    .post-content {
        color: #333;
        word-break: break-all;
    }
</style>
{% endblock %}
