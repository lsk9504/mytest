<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Django 폼 필드들을 Bootstrap 스타일로 강제 교정 */
        form input, form select, form textarea {
            display: block;
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }
        form input:focus {
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        /* 라벨과 입력창 사이 간격 및 정렬 */
        .form-label {
            display: inline-block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="w-100" style="max-width: 450px; padding: 20px;">
    <div class="card shadow border-0">
        <div class="card-body p-5">

            <h3 class="mb-4 text-center fw-bold">회원가입</h3>

            <form method="post">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="alert alert-danger small">
                        입력 내용을 확인해주세요.
                    </div>
                {% endif %}

                <div class="mb-3">
                    <label for="id_username" class="form-label">아이디</label>
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label for="id_email" class="form-label">이메일</label>
                    {{ form.email }}
                </div>

                <div class="mb-3">
                    <label for="id_password1" class="form-label">비밀번호</label>
                    {{ form.password1 }}
                </div>

                <div class="mb-4">
                    <label for="id_password2" class="form-label">비밀번호 확인</label>
                    {{ form.password2 }}
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">
                        가입하기
                    </button>
                </div>

                <div class="text-center mt-3">
                    <span class="text-muted small">이미 계정이 있으신가요?</span>
                    <a href="{% url 'login' %}" class="text-decoration-none small ms-1">로그인</a>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
