<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="w-100" style="max-width: 500px;">
    <div class="card shadow-sm">
        <div class="card-body p-4 text-center">

            <h3 class="mb-4">로그인</h3>

            <form method="post">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="alert alert-danger">
                        아이디 또는 비밀번호가 틀렸습니다.
                    </div>
                {% endif %}

                <!-- username -->
                <div class="mb-3">
                    <div class="mx-auto d-flex align-items-center" style="max-width: 300px;">
                        <label class="form-label mb-0 me-2" style="width: 80px;">아이디</label>
                        {{ form.username }}
                    </div>
                </div>

                <!-- password -->
                <div class="mb-4">
                    <div class="mx-auto d-flex align-items-center" style="max-width: 300px;">
                        <label class="form-label mb-0 me-2" style="width: 80px;">비밀번호</label>
                        {{ form.password }}
                    </div>
                </div>

                <!-- 로그인 & 회원가입 버튼 -->
                <div class="d-flex justify-content-center gap-2 mx-auto" style="max-width: 300px;">
                    <button type="submit" class="btn btn-primary flex-grow-1">
                        로그인
                    </button>
                    <a href="{% url 'signup' %}" class="btn btn-secondary flex-grow-1">
                        회원가입
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
