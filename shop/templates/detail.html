{% extends 'base.html' %}
{% load static %}

{% block title %}DetailShop{% endblock %}

{% block content %}
    <!-- Start Categories  -->
   <div class="container my-5">
    <h1>{{ item.name }}</h1>
    <img src="{{ item.image.url }}" alt="{{ item.name }}" class="img-fluid mb-3" />
    <p><strong>제품 설명:</strong> {{ item.description }}</p>
    <p><strong>유통기한:</strong> {{ item.expiration_date }}</p>
    <a href="{% url 'index' %}" class="btn btn-secondary mt-3">목록으로 돌아가기</a>
</div>
    <!-- End Categories -->

	{% endblock %}
